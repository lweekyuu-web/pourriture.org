<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Mon site</title>
</head>
<body>
  <main class="container" id="clickArea" role="button" tabindex="0">
    <h1 id="text">Clique ici</h1>
    <img id="gif" src="omega-nugget.gif" alt="Gif animé">
  </main>

  <script>
    let clicks = 0;
    const clickArea = document.getElementById('clickArea');
    const text = document.getElementById('text');
    const gif = document.getElementById('gif');

    clickArea.addEventListener('click', clickSite);
    clickArea.addEventListener('keydown', function(event) {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        clickSite();
      }
    });

    function clickSite() {
      clicks += 1;
      if (clicks === 1) {
        text.textContent = 'enkor';
        gif.style.display = 'block';
      } else if (clicks === 2) {
        text.textContent = 'ENKOR G DIT';
      } else if (clicks === 3) {
        text.textContent = 'b-bakadayo...T-tu insistes vraiment...?';
      } else if (clicks === 4) {
        text.textContent = 'bravo Hugo charpipi G TON ADRESSE IP';
      } else {
        text.textContent = 'Tu as cliqué ' + clicks + ' fois';
      }
    }
  </script>
</body>
</html>
