<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Phrases</title>

<style>
body{
    margin:0;
    background-color:black;
    font-color:green;
    font-family: Helvetica,Arial, sans-serif;
    display:center;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#texte{
    font-size:2rem;
    text-align:center;
    opacity:1;
    transition:opacity .4s;
}
</style>
</head>
<body>

<div id="texte"></div>

<script>
const phrases = [
    "Si tu es sur ce site",
    "C'est soit tu me connais",
    "sois tu es tomber dessus par hasard",
    "et au passage ntm"
];

let index = 0;
const texte = document.getElementById("texte");

function afficherPhrase() {
    texte.style.opacity = 0;

    setTimeout(() => {
        texte.textContent = phrases[index];
        texte.style.opacity = 1;

        index++;
        if (index >= phrases.length) index = 0; //
    }, 600);
}


setInterval(afficherPhrase, 43000);
</script>

</body>
</html>
